# =============================================================================
#  server.cfg  —  Vorlage für einen lokalen / LAN FiveM-Test-Server
# =============================================================================
#  Funktioniert mit dem selbst gebauten Linux-Client (siehe README.md).
#  Kopiere diese Datei nach ~/fx-server/server-data/server.cfg
#  (das erledigt setup-local-server.sh automatisch) und trage unten
#  deinen GRATIS-Lizenz-Key ein.
# =============================================================================

# --- Endpunkte: auf allen Interfaces lauschen, Standard-Port 30120 ----------
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"

# --- LAN-Modus: erlaubt dem selbst gebauten (Insecure) Client die Auth ------
sv_lan 1

sv_maxclients 8
set sv_enforceSteamAuth false
sv_scriptHookAllowed 0

# --- Standard-Ressourcen (aus cfx-server-data) ------------------------------
ensure mapmanager
ensure chat
ensure spawnmanager
ensure sessionmanager
ensure fivem
ensure hardcap
ensure baseevents

# --- Anzeigename in der Serverliste / im Menü -------------------------------
sv_hostname "LOCAL TEST (Linux-Client in-game verify)"

# =============================================================================
#  GRATIS-Lizenz-Key (auch im LAN-Modus PFLICHT!)
#  Hol dir einen kostenlosen Key mit deinem eigenen Cfx.re-Account hier:
#      https://portal.cfx.re/servers/registration-keys
#  und ersetze CHANGEME_... durch deinen Key:
# =============================================================================
sv_licenseKey CHANGEME_free_key_from_portal.cfx.re
